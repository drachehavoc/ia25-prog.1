<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body > * {
      border: 2px solid blue;
    }

    * {
      box-sizing: border-box;
    }

    :root {
      --grid-info-size: 250px;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      display: grid;
      grid-template-areas:
        "social info   content"
        "footer footer footer";
      grid-template-columns: 100px var(--grid-info-size) 1fr;
      grid-template-rows: 1fr 120px;
      gap: .5rem;
      padding: .5rem;
      min-height: 100svh;
    }

    aside {
      display: flex;
      flex-direction: column;
      align-items: center;
    
      grid-area: info;

      .thumb {
        width: calc(var(--grid-info-size) - 20px);
        height: calc(var(--grid-info-size) - 20px);
        background-color: lightgray;
        border-radius: 50%;
        flex: none;
        z-index: 2;
      }

      section {
        background-color: lightcoral;
        width: 100%;
        height: 100%;
        margin-top: -4rem;
        padding-top: 4rem;
        z-index: 1;
      }
    }

    main {
      grid-area: content;
    } 

    .social {
      grid-area: social;
    }

    footer {
      grid-area: footer;
    }
  </style>
</head>

<body>
<aside>
    <div class="thumb">
    </div>
    <section>aside</section>
  </aside>
  <main>
    <article>
      <h1>Article Title</h1>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Donec vel sapien eget
        nunc efficitur commodo. Sed ut perspiciatis unde omnis iste natus error sit
        voluptatem accusantium doloremque laudantium.
      </p>
    </article>
    <div class="gallery">
      <img src="https://picsum.photos/200/200?1" alt="Image 1">
      <img src="https://picsum.photos/200/200?2" alt="Image 2">
      <img src="https://picsum.photos/200/200?3" alt="Image 3">
    </div>
  </main>
  
  <div class="social">
    <a href="https://www.facebook.com">Facebook</a>
    <a href="https://www.twitter.com">Twitter</a>
    <a href="https://www.instagram.com">Instagram</a>
  </div>

  <footer>
    <p>&copy; 2024 Niel. All rights reserved.</p>
  </footer>
</body>

</html>
